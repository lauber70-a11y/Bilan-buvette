<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caisse-Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        body { touch-action: manipulation; background-color: #f1f5f9; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .active-tab { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 900; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; position: relative; }
        .alert-blink { background-color: #fff1f2; border: 2px solid #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } #reportZone { display: block !important; position: static; } }
        /* Pour éviter tout bug d'affichage */
        #reportZone { position: absolute; top: 0; left: 0; width: 100%; z-index: 100; min-height: 100vh; background: white; }
        .btn-delete { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; border: 2px solid white; cursor: pointer; }
    </style>
</head>
<body class="p-3 pb-32">

    <div id="mainUI" class="no-print">
        <header class="mb-4 flex items-center justify-between bg-slate-900 p-4 rounded-3xl shadow-2xl border border-slate-700">
            <div>
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Poste Actif</p>
                <select id="posID" onchange="render()" class="bg-transparent text-white text-lg font-black outline-none cursor-pointer">
                    <option value="A" class="text-black">POSTE A</option>
                    <option value="B" class="text-black">POSTE B</option>
                </select>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-black text-emerald-500 uppercase italic mb-1" id="cloudStatus">Vérification...</p>
                <p id="grandTotal" class="text-2xl font-black text-emerald-400">0.00€</p>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-white p-3 rounded-2xl border border-slate-200 text-center">
                <span class="text-[8px] font-black text-slate-400 uppercase italic">Recette A</span>
                <p id="recetteA" class="text-base font-black text-slate-800">0.00€</p>
            </div>
            <div class="bg-white p-3 rounded-2xl border border-slate-200 text-center">
                <span class="text-[8px] font-black text-slate-400 uppercase italic">Recette B</span>
                <p id="recetteB" class="text-base font-black text-slate-800">0.00€</p>
            </div>
        </div>

        <nav class="flex bg-white rounded-2xl border border-slate-200 overflow-hidden mb-6">
            <button onclick="switchTab('boisson')" id="tab-boisson" class="flex-1 py-4 text-xs uppercase font-black active-tab">🍺 Boissons</button>
            <button onclick="switchTab('restau')" id="tab-restau" class="flex-1 py-4 text-xs uppercase font-black text-slate-400">🍔 Restauration</button>
            <button onclick="switchTab('config')" id="tab-config" class="flex-1 py-4 text-xs uppercase font-black text-slate-400">⚙️ Admin</button>
        </nav>

        <div id="section-boisson" class="space-y-4"></div>
        <div id="section-restau" class="hidden space-y-4"></div>

        <section id="section-config" class="hidden space-y-4">
            <button onclick="generateReport()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black uppercase shadow-lg">📊 Générer le Bilan</button>
            <div class="card p-5">
                <h2 class="text-xs font-black uppercase text-slate-500 mb-4 border-b pb-2">Ajouter un produit</h2>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="itemName" placeholder="Nom" class="col-span-2 p-3 rounded-xl bg-slate-100 font-bold outline-none">
                    <input type="number" id="itemQty" placeholder="Fûts" class="p-3 rounded-xl bg-slate-100 font-bold outline-none">
                    <input type="number" id="itemRatio" placeholder="Ratio" class="p-3 rounded-xl bg-slate-100 font-bold outline-none">
                    <input type="number" id="itemSell" placeholder="Prix (€)" class="p-3 rounded-xl bg-slate-100 font-bold outline-none">
                    <button onclick="addItem()" class="col-span-2 bg-slate-900 text-white p-4 rounded-xl font-black uppercase">Valider</button>
                </div>
            </div>
        </section>
    </div>

    <div id="reportZone" class="hidden p-4">
        <h1 class="text-2xl font-black border-b-4 border-black pb-2 mb-4 text-center uppercase italic">Bilan Évènement</h1>
        <div id="printStats" class="mb-6"></div>
        <div id="printDetails" class="space-y-8"></div>

        <section class="mt-8 pt-6 border-t-4 border-double border-black">
            <h2 class="text-center font-black uppercase text-lg mb-4 italic">📦 Stocks Totaux Restants (A+B)</h2>
            <table class="w-full text-xs border-collapse">
                <thead class="bg-slate-200">
                    <tr>
                        <th class="p-2 text-left border border-black">Produit</th>
                        <th class="p-2 border border-black text-center">Vendus</th>
                        <th class="p-2 border border-black text-center bg-yellow-100">Stock Final</th>
                    </tr>
                </thead>
                <tbody id="reportTotalStock"></tbody>
            </table>
        </section>

        <div class="no-print mt-10 space-y-3">
            <button onclick="window.print()" class="w-full bg-emerald-600 text-white p-5 rounded-2xl font-black uppercase shadow-xl">🖨️ Imprimer</button>
            <button onclick="closeReport()" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-black uppercase text-xs">⬅️ Retour à la Caisse</button>
        </div>
    </div>

    <script>
        // --- CONFIG FIREBASE ---
        const firebaseConfig = {
             apiKey: "AIzaSyB1YkVkCYeNoDLxyaUgcxhyKMEPzYNteGI",
  authDomain: "bilan-buvette.firebaseapp.com",
  projectId: "bilan-buvette",
  storageBucket: "bilan-buvette.firebasestorage.app",
  messagingSenderId: "89721562835",
  appId: "1:89721562835:web:9d6256a024ab90a33bd626"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let inventory = [];
        let caisse = { A: 0, B: 0 };

        db.ref('data/').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                inventory = data.inventory || [];
                caisse = data.caisse || { A: 0, B: 0 };
                document.getElementById('cloudStatus').innerText = "● CLOUD LIVE";
                render();
            }
        });

        function saveData() { db.ref('data/').set({ inventory, caisse }); }

        function render() {
            const pos = document.getElementById('posID').value;
            const listB = document.getElementById('section-boisson');
            listB.innerHTML = ''; 
            
            inventory.forEach((item, index) => {
                const sL = pos === 'A' ? item.qtyA : item.qtyB;
                const soldU = (pos === 'A' ? item.soldA : item.soldB) * item.ratio;
                
                const itemDiv = document.createElement('div');
                itemDiv.className = `card p-5 ${sL <= (item.alert || 0) ? 'alert-blink' : ''}`;
                itemDiv.innerHTML = `
                    <button onclick="deleteItem(${index})" class="btn-delete no-print">×</button>
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="font-black text-slate-900 uppercase text-lg">${item.name}</h3>
                        <div class="text-right">
                           <span class="block text-3xl font-black text-blue-600">${soldU}</span>
                           <span class="text-[9px] font-black text-blue-300 uppercase">Unités P${pos}</span>
                        </div>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl text-center border mb-4">
                        <p class="text-[8px] font-black text-slate-400 uppercase">Fûts restants (Poste ${pos})</p>
                        <p class="text-3xl font-black text-slate-800">${sL}</p>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="adjustStock(${index})" class="bg-white border text-slate-400 py-4 rounded-xl font-black text-[9px]">INV.</button>
                        <button onclick="handleTransfer(${index})" class="bg-slate-900 text-white py-4 rounded-xl font-black text-[8px]">ENVOI</button>
                        <button onclick="consume(${index})" class="bg-red-500 text-white py-4 rounded-xl font-black text-xs">VENDRE</button>
                    </div>
                `;
                listB.appendChild(itemDiv);
            });
            document.getElementById('recetteA').innerText = caisse.A.toFixed(2) + "€";
            document.getElementById('recetteB').innerText = caisse.B.toFixed(2) + "€";
            document.getElementById('grandTotal').innerText = (caisse.A + caisse.B).toFixed(2) + "€";
        }

        function consume(i) {
            const pos = document.getElementById('posID').value;
            if ((pos === 'A' ? inventory[i].qtyA : inventory[i].qtyB) > 0) {
                if (pos === 'A') { inventory[i].qtyA--; inventory[i].soldA++; } 
                else { inventory[i].qtyB--; inventory[i].soldB++; }
                caisse[pos] += (inventory[i].ratio * inventory[i].sell);
                saveData();
            }
        }

        function adjustStock(i) {
            const pos = document.getElementById('posID').value;
            const item = inventory[i];
            const current = pos === 'A' ? item.qtyA : item.qtyB;
            const n = prompt(`Nouveau stock physique (Poste ${pos}) ?`, current);
            if (n !== null && n !== "" && !isNaN(parseInt(n))) {
                const nouveau = parseInt(n);
                if (nouveau < current) {
                    const diff = current - nouveau;
                    if (confirm(`Ajouter ${(diff * item.ratio * item.sell).toFixed(2)}€ à la caisse ?`)) {
                        caisse[pos] += (diff * item.ratio * item.sell);
                        if (pos === 'A') item.soldA += diff; else item.soldB += diff;
                    }
                }
                if (pos === 'A') item.qtyA = nouveau; else item.qtyB = nouveau;
                saveData();
            }
        }

        function generateReport() {
            document.getElementById('mainUI').style.display = 'none';
            document.getElementById('reportZone').classList.remove('hidden');
            
            const details = document.getElementById('printDetails');
            const totalStockBody = document.getElementById('reportTotalStock');
            details.innerHTML = ''; totalStockBody.innerHTML = '';
            
            ['A', 'B'].forEach(p => {
                let html = `<div class="mb-4"><h2 class="bg-black text-white p-2 text-xs font-black uppercase italic">POSTE ${p}</h2><table class="w-full text-[10px] border-collapse"><thead><tr class="bg-slate-100"><th class="p-2 text-left border">Article</th><th class="p-2 border">Fûts Vendus</th><th class="p-2 text-right border">Recette</th></tr></thead><tbody>`;
                inventory.forEach(item => {
                    const s = p === 'A' ? item.soldA : item.soldB;
                    if(s > 0) html += `<tr><td class="p-2 border uppercase font-bold">${item.name}</td><td class="p-2 border text-center">${s}</td><td class="p-2 border text-right">${(s * item.ratio * item.sell).toFixed(2)}€</td></tr>`;
                });
                html += `</tbody></table><div class="text-right font-black p-2 text-xs bg-slate-50 italic">RECETTE ${p} : ${caisse[p].toFixed(2)}€</div></div>`;
                details.innerHTML += html;
            });

            inventory.forEach(item => {
                totalStockBody.innerHTML += `<tr class="border-b"><td class="p-2 font-black uppercase">${item.name}</td><td class="p-2 text-center font-bold">${(item.soldA||0)+(item.soldB||0)}</td><td class="p-2 text-center font-black bg-yellow-50">${(item.qtyA||0)+(item.qtyB||0)} fûts</td></tr>`;
            });

            document.getElementById('printStats').innerHTML = `<div class="bg-black text-white p-4 rounded-xl text-center"><p class="text-3xl font-black text-emerald-400">${(caisse.A+caisse.B).toFixed(2)}€</p><p class="text-[8px] uppercase">Recette Totale</p></div>`;
        }

        function closeReport() {
            document.getElementById('reportZone').classList.add('hidden');
            document.getElementById('mainUI').style.display = 'block';
            // Aucun rechargement de page ici : les produits restent affichés !
        }

        function addItem() {
            const pos = document.getElementById('posID').value;
            const name = document.getElementById('itemName').value;
            if(name) {
                inventory.push({
                    name, qtyA: pos === 'A' ? parseInt(document.getElementById('itemQty').value) : 0,
                    qtyB: pos === 'B' ? parseInt(document.getElementById('itemQty').value) : 0,
                    ratio: parseInt(document.getElementById('itemRatio').value) || 1,
                    sell: parseFloat(document.getElementById('itemSell').value) || 0,
                    soldA: 0, soldB: 0
                });
                saveData();
                document.getElementById('itemName').value = '';
            }
        }

        function handleTransfer(i) {
            const pos = document.getElementById('posID').value;
            const target = pos === 'A' ? 'B' : 'A';
            const q = prompt(`Transférer combien vers ${target} ?`, "1");
            if (q > 0) {
                if (pos === 'A' && inventory[i].qtyA >= q) { inventory[i].qtyA -= parseInt(q); inventory[i].qtyB += parseInt(q); }
                else if (pos === 'B' && inventory[i].qtyB >= q) { inventory[i].qtyB -= parseInt(q); inventory[i].qtyA += parseInt(q); }
                saveData();
            }
        }

        function switchTab(t) {
            ['boisson', 'restau', 'config'].forEach(tab => {
                document.getElementById('section-' + tab).classList.toggle('hidden', tab !== t);
                document.getElementById('tab-' + tab).classList.toggle('active-tab', tab === t);
            });
        }
        function deleteItem(i) { if(confirm("Supprimer ?")) { inventory.splice(i, 1); saveData(); } }
        function resetAll() { if(confirm("🚨 RESET TOTAL ?")) { db.ref('data/').remove(); location.reload(); } }
    </script>
</body>
</html>
